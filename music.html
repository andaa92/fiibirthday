<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Our Memories | Birthday Surprise</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="app-shell">
    <section class="page active">
      <div class="page-content stack">
        
        <!-- Header Halaman & Tombol Kembali -->
        <header class="page-header page-header--with-action">
          <div>
            <p class="eyebrow">Our Memories</p>
            <h1>Foto yang bergerak</h1>
          </div>
          <button class="button button--secondary" type="button" data-route="dashboard">Kembali</button>
        </header>

        <!-- Wadah Slideshow Foto Bergerak -->
        <div class="photo-slideshow" aria-label="Slideshow foto kenangan">
          <div class="photo-slideshow__track" id="music-slideshow"></div>
        </div>

      </div>
    </section>
  </main>

  <!-- Skrip JavaScript -->
  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/router.js"></script>
  <script src="js/login.js"></script>
  <script src="js/loveMeter.js"></script>
  <script src="js/music.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/wish.js"></script>

</body>
</html>
