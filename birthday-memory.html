<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>17 Juli 2008</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    if (sessionStorage.getItem('birthday-surprise:nightSkyTransition')) {
      document.documentElement.classList.add('is-night-sky-loading');
    }
  </script>
</head>
<body>

  <main class="app-shell">
    <section class="page page--center active memory-page">
      <div class="memory-layout">
        
        <!-- Kalender -->
        <article class="memory-calendar">
          <header>
            <strong>Juli</strong>
            <strong>2008</strong>
          </header>
          <div class="calendar-week">
            <span>S</span>
            <span>S</span>
            <span>R</span>
            <span>K</span>
            <span>J</span>
            <span>S</span>
            <span>M</span>
          </div>
          <div class="calendar-days">
            <i></i>
            <i></i>
            <span>1</span>
            <span>2</span>
            <span>3</span>
            <span>4</span>
            <span>5</span>
            <span>6</span>
            <span>7</span>
            <span>8</span>
            <span>9</span>
            <span>10</span>
            <span>11</span>
            <span>12</span>
            <span>13</span>
            <span>14</span>
            <span>15</span>
            <span>16</span>
            <b>17</b>
            <span>18</span>
            <span>19</span>
            <span>20</span>
            <span>21</span>
            <span>22</span>
            <span>23</span>
            <span>24</span>
            <span>25</span>
            <span>26</span>
            <span>27</span>
            <span>28</span>
            <span>29</span>
            <span>30</span>
            <span>31</span>
          </div>
          <p>This is <mark>your special day</mark></p>
        </article>

        <!-- Kolase Foto & Dekorasi -->
        <article class="memory-collage">
          <button class="memory-next" type="button" data-route="love-meter">
            Next &#8250;
          </button>
          <p class="memory-title">My Little</p>
          <div class="memory-photo-frame">
            <figure class="memory-heart memory-heart--one"><img src="assets/images/kenangan1.png" alt="Foto kenangan 1"></figure>
            <figure class="memory-heart memory-heart--two"><img src="assets/images/kenangan2.png" alt="Foto kenangan 2"></figure>
          </div>
          <span class="memory-flower memory-flower--one">✿</span>
          <span class="memory-flower memory-flower--two">❀</span>
          <span class="memory-sparkle">✧</span>
        </article>

      </div>
    </section>
  </main>

  <!-- JavaScript Files -->
  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/router.js"></script>
  <script src="js/login.js"></script>
  <script src="js/loveMeter.js"></script>
  <script src="js/music.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/wish.js"></script>

</body>
</html>
